[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tools]
biome = "latest"
fnox = "latest"
node = "lts"

[env]
_.fnox-env = { tools = true }

[tasks."test:integration"]
description = "Build and run Docker-backed real Pi integration tests"
run = """
set -euo pipefail
docker build \
  -f packages/pi-mimir/tests/integration/docker/Dockerfile \
  -t pi-mimir-workflow-e2e \
  .
docker run --rm \
  -e ZAI_API_KEY \
  -e E2E_MODEL \
  --workdir /workspace/pi-mimir-workflow \
  pi-mimir-workflow-e2e \
  npm run test:e2e --workspace pi-mimir
docker run --rm \
  -e ZAI_API_KEY \
  -e E2E_MODEL \
  --workdir /workspace/pi-mimir-workflow \
  pi-mimir-workflow-e2e \
  npm run test:e2e --workspace @casualjim/pi-caveman
"""
