[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tools]
biome = "latest"
fnox = "latest"
node = "lts"

[env]
_.fnox-env = { tools = true }

[tasks."test:integration"]
description = "Build and run Docker-backed real Pi integration tests"
run = """
set -euo pipefail
docker build --progress=plain \
  -f packages/core/tests/integration/docker/Dockerfile \
  -t pi-mimir-workflow-e2e \
  .
docker run --rm \
  -e ZAI_API_KEY \
  -e E2E_MODEL \
  pi-mimir-workflow-e2e
"""
